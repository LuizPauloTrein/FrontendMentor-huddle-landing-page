<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>
</head>

<body>
  <header class="header">
    <a href="#"><img class="logo" src="assets/images/logo.svg" alt="Huddle"></a>
  </header>

  <main>
    <div class="container">
      <section class="main-image">
        <img src="assets/images/illustration-mockups.svg" alt="illustration mockups main image">
      </section>
      <section class="description">
        <h1 class="title">Build The Community Your Fans Will Love</h1>
        <p class="quote">Huddle re-imagines the way we build communities. You have a voice, but so does your audience.
          Create connections with your users as you engage in genuine discussion.</p>
        <button class="btn-register">Register</button>
      </section>
    </div>
  </main>

  <footer class="footer">
    <ul class="socials">
      <li><a href="#"><img src="assets/images/facebook.svg" alt="icon facebook"></a></li>
      <li><a href="#"><img src="assets/images/twitter.svg" alt="icon twitter"></a></li>
      <li><a href="#"><img src="assets/images/instagram.svg" alt="icon instagram"></a></li>
    </ul>
  </footer>

</body>

</html>
